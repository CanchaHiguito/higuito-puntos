<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Higuito — Panel Admin</title>
  <meta name="theme-color" content="#000000">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #111; min-height: 100vh; display: flex; flex-direction: column; }
    .header { background: #000; padding: 16px; text-align: center; border-bottom: 3px solid #F9A825; }
    .header h1 { color: #F9A825; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    .header h2 { color: #B71C1C; font-size: 20px; font-weight: 900; letter-spacing: 3px; }
    .header p { color: #fff; font-size: 11px; opacity: 0.8; }
    .camara-wrap { position: relative; flex: 1; overflow: hidden; min-height: 400px; }
    #reader { width: 100%; height: 100%; }
    .resultado { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; display: none; z-index: 50; }
    .resultado.ok { background: rgba(46,125,50,0.97); }
    .resultado.error { background: rgba(183,28,28,0.97); }
    .resultado.ya { background: rgba(245,127,23,0.97); }
    .resultado h3 { color: #fff; font-size: 20px; font-weight: 900; margin-bottom: 4px; }
    .resultado p { color: rgba(255,255,255,0.9); font-size: 14px; margin-bottom: 12px; }
    .puntos-big { font-size: 56px; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 4px; }
    .btn-siguiente { width: 100%; padding: 16px; background: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; color: #2E7D32; }
    .btn-admin { position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.6); color: #F9A825; border: 1px solid #F9A825; padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; z-index: 60; }
    .pin-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; z-index: 100; }
    .pin-card { background: #fff; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 340px; text-align: center; }
    .pin-card h2 { font-size: 20px; font-weight: 900; color: #111; margin-bottom: 4px; }
    .pin-card p { font-size: 13px; color: #777; margin-bottom: 16px; }
    .pin-input { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 28px; text-align: center; letter-spacing: 8px; margin-bottom: 8px; }
    .pin-input:focus { outline: none; border-color: #B71C1C; }
    .pin-error { color: #B71C1C; font-size: 13px; display: none; margin-bottom: 8px; }
    .btn-cancelar { width: 100%; padding: 12px; background: #f5f5f5; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; color: #555; margin-top: 8px; }
    .admin-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #111; display: none; flex-direction: column; z-index: 100; overflow-y: auto; }
    .admin-panel.activo { display: flex; }
    .admin-header { background: #000; padding: 16px 20px; border-bottom: 3px solid #F9A825; display: flex; align-items: center; justify-content: space-between; }
    .admin-header h2 { color: #F9A825; font-size: 16px; font-weight: 900; }
    .btn-cerrar-admin { background: none; border: 1px solid #555; color: #aaa; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .admin-menu { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .admin-btn { padding: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 16px; width: 100%; }
    .admin-btn:active { background: #222; }
    .admin-btn .icono { font-size: 32px; }
    .admin-btn .info h3 { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .admin-btn .info p { font-size: 12px; color: #aaa; }
    .admin-btn.campanas { border-left: 4px solid #F9A825; }
    .admin-btn.reservas { border-left: 4px solid #2E7D32; }
    .admin-btn.push { border-left: 4px solid #1565C0; }
    .push-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #111; display: none; flex-direction: column; z-index: 100; overflow-y: auto; }
    .push-panel.activo { display: flex; }
    .push-header { background: #000; padding: 16px 20px; border-bottom: 3px solid #1565C0; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .push-header h2 { color: #42A5F5; font-size: 16px; font-weight: 900; }
    .push-body { padding: 20px; flex: 1; }
    .push-grupo { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .push-grupo label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: bold; }
    .push-grupo input, .push-grupo textarea { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; font-family: Arial, sans-serif; }
    .push-grupo textarea { height: 80px; resize: none; }
    .push-grupo input:focus, .push-grupo textarea:focus { outline: none; border-color: #42A5F5; }
    .btn-enviar { width: 100%; padding: 18px; background: #1565C0; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    .btn-enviar:active { background: #0D47A1; }
    .btn-enviar:disabled { opacity: 0.5; cursor: not-allowed; }
    .push-resultado { background: #1a1a1a; border-radius: 10px; padding: 14px; margin-top: 12px; display: none; text-align: center; }
    .push-resultado.ok { border: 1px solid #2E7D32; }
    .push-resultado.error { border: 1px solid #B71C1C; }
    .push-resultado p { font-size: 14px; color: #fff; }
    .preview-box { background: #000; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #333; }
    .preview-titulo { color: #aaa; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .preview-notif { background: #1a1a1a; border-radius: 10px; padding: 12px; display: flex; align-items: center; gap: 12px; }
    .preview-notif .icono { font-size: 28px; }
    .preview-notif .texto h4 { color: #fff; font-size: 14px; font-weight: bold; }
    .preview-notif .texto p { color: #aaa; font-size: 12px; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Centro Deportivo</h1>
    <h2>HIGUITO</h2>
    <p>Escáner de puntos</p>
  </div>

  <div class="camara-wrap">
    <div id="reader"></div>
  </div>

  <div class="resultado" id="resultado">
    <h3 id="res-titulo">...</h3>
    <div class="puntos-big" id="res-puntos" style="display:none"></div>
    <p id="res-texto">...</p>
    <button class="btn-siguiente" onclick="siguienteEscaneo()">✅ Listo — Siguiente cliente</button>
  </div>

  <button class="btn-admin" onclick="mostrarPinAdmin()">⚙️ Admin</button>

  <div class="pin-overlay" id="pin-overlay" style="display:none">
    <div class="pin-card">
      <div style="font-size:36px;margin-bottom:12px">🔐</div>
      <h2>Acceso Admin</h2>
      <p>Ingresá el PIN de administrador</p>
      <input type="password" class="pin-input" id="pin-input" placeholder="••••" maxlength="4" oninput="verificarPinAdmin()">
      <div class="pin-error" id="pin-error">PIN incorrecto</div>
      <button class="btn-cancelar" onclick="cerrarPinAdmin()">Cancelar</button>
    </div>
  </div>

  <div class="admin-panel" id="admin-panel">
    <div class="admin-header">
      <h2>⚙️ Panel Administrador</h2>
      <button class="btn-cerrar-admin" onclick="cerrarAdmin()">✕ Cerrar</button>
    </div>
    <div class="admin-menu">
      <button class="admin-btn campanas" onclick="abrirSeccion('campanas')">
        <div class="icono">📤</div>
        <div class="info"><h3>Campañas WhatsApp</h3><p>Enviar mensajes masivos por grupos de edad</p></div>
      </button>
      <button class="admin-btn reservas" onclick="abrirSeccion('reservas')">
        <div class="icono">📅</div>
        <div class="info"><h3>Reservaciones</h3><p>Nueva reserva manual y ver calendario</p></div>
      </button>
      <button class="admin-btn push" onclick="abrirSeccion('push')">
        <div class="icono">🔔</div>
        <div class="info"><h3>Notificaciones Push</h3><p>Enviar notificaciones a todos los clientes</p></div>
      </button>
    </div>
  </div>

  <div class="push-panel" id="push-panel">
    <div class="push-header">
      <h2>🔔 Notificaciones Push</h2>
      <button class="btn-cerrar-admin" onclick="cerrarPush()">✕ Cerrar</button>
    </div>
    <div class="push-body">
      <div class="preview-box">
        <div class="preview-titulo">Vista previa</div>
        <div class="preview-notif">
          <div class="icono">⚽</div>
          <div class="texto">
            <h4 id="preview-titulo-text">Título de la notificación</h4>
            <p id="preview-mensaje-text">Mensaje de la notificación...</p>
          </div>
        </div>
      </div>
      <div class="push-grupo">
        <label>Título</label>
        <input type="text" id="push-titulo" placeholder="Ej: ¡Promo especial este viernes!" oninput="actualizarPreview()">
      </div>
      <div class="push-grupo">
        <label>Mensaje</label>
        <textarea id="push-mensaje" placeholder="Ej: 2x1 en canchas de 8pm a 10pm. ¡Solo para clientes Higuito!" oninput="actualizarPreview()"></textarea>
      </div>
      <div class="push-grupo">
        <label>Imagen (URL opcional)</label>
        <input type="text" id="push-imagen" placeholder="https://... (URL de una imagen)">
      </div>
      <div class="push-grupo">
        <label>Enlace al tocar la notificación</label>
        <input type="text" id="push-url" value="https://canchahiguito.github.io/higuito-puntos">
      </div>
      <button class="btn-enviar" id="btn-enviar" onclick="enviarNotificacion()">🔔 Enviar notificación</button>
      <div class="push-resultado" id="push-resultado">
        <p id="push-resultado-texto"></p>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzpDCe_abY6qPBGhE7fPIZL8wjV5Fn7R4XBmhZxehKA5zDzrcyOIYbp8YdS6sAaw/exec';
  const PIN_ADMIN = '1234';
  let procesando = false;
  let html5QrCode = null;

  window.onload = function() { iniciarEscaner(); };

  function iniciarEscaner() {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 220, height: 220 } },
      onQRDetectado,
      () => {}
    ).catch(() => {
      document.querySelector('.camara-wrap').innerHTML = `
        <div style="color:#fff;text-align:center;padding:32px 20px;">
          <div style="font-size:48px;margin-bottom:16px">📷</div>
          <p>No se pudo acceder a la cámara.<br>Permitá el acceso en la configuración.</p>
        </div>`;
    });
  }

  async function onQRDetectado(decodedText) {
    if (procesando) return;
    const match = decodedText.match(/[?&]tel=([^&]+)/);
    if (!match) return;
    procesando = true;
    await sumarPunto(match[1]);
  }

  async function sumarPunto(telefono) {
    try {
      const resp = await fetch(SCRIPT_URL + '?accion=sumarPunto&telefono=' + telefono);
      const data = await resp.json();
      const res = document.getElementById('resultado');
      if (data.ok) {
        if (data.premio) {
          res.className = 'resultado ok';
          document.getElementById('res-titulo').textContent = '🏆 ¡PARTIDO GRATIS!';
          document.getElementById('res-puntos').style.display = 'none';
          document.getElementById('res-texto').textContent = 'Este cliente llegó a 10 puntos. Autorizá el acceso gratuito.';
        } else {
          res.className = 'resultado ok';
          document.getElementById('res-titulo').textContent = '✅ ¡Punto sumado!';
          document.getElementById('res-puntos').style.display = 'block';
          document.getElementById('res-puntos').textContent = data.puntos;
          document.getElementById('res-texto').textContent = 'Le faltan ' + Math.max(10 - data.puntos, 0) + ' puntos para partido gratis';
        }
      } else if (data.motivo === 'ya_registrado') {
        res.className = 'resultado ya';
        document.getElementById('res-titulo').textContent = '⚠️ Ya registrado hoy';
        document.getElementById('res-puntos').style.display = 'none';
        document.getElementById('res-texto').textContent = 'Este cliente ya sumó su punto hoy.';
      } else {
        res.className = 'resultado error';
        document.getElementById('res-titulo').textContent = '❌ Error';
        document.getElementById('res-puntos').style.display = 'none';
        document.getElementById('res-texto').textContent = data.error || 'No se pudo procesar.';
      }
      res.style.display = 'block';
    } catch(e) {
      const res = document.getElementById('resultado');
      res.className = 'resultado error';
      document.getElementById('res-titulo').textContent = '❌ Error de conexión';
      document.getElementById('res-puntos').style.display = 'none';
      document.getElementById('res-texto').textContent = 'Intentá de nuevo.';
      res.style.display = 'block';
      procesando = false;
    }
  }

  function siguienteEscaneo() {
    document.getElementById('resultado').style.display = 'none';
    document.getElementById('resultado').className = 'resultado';
    procesando = false;
  }

  function mostrarPinAdmin() {
    document.getElementById('pin-overlay').style.display = 'flex';
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').style.display = 'none';
  }

  function cerrarPinAdmin() {
    document.getElementById('pin-overlay').style.display = 'none';
  }

  function verificarPinAdmin() {
    const pin = document.getElementById('pin-input').value;
    if (pin.length === 4) {
      if (pin === PIN_ADMIN) {
        document.getElementById('pin-overlay').style.display = 'none';
        document.getElementById('admin-panel').classList.add('activo');
      } else {
        document.getElementById('pin-error').style.display = 'block';
        document.getElementById('pin-input').value = '';
      }
    }
  }

  function cerrarAdmin() {
    document.getElementById('admin-panel').classList.remove('activo');
  }

  function abrirSeccion(seccion) {
    if (seccion === 'campanas') {
      window.open('https://script.google.com/macros/s/AKfycbyzpDCe_abY6qPBGhE7fPIZL8wjV5Fn7R4XBmhZxehKA5zDzrcyOIYbp8YdS6sAaw/exec?accion=panel', '_blank');
    } else if (seccion === 'reservas') {
      window.open('https://script.google.com/macros/s/AKfycbxhC2x7_WXD47rdJDYjaRouvEd2Fz-ulhge0WwwSjShCP7L5DDVhnLiSW-w3TW0IaQWvA/exec', '_blank');
    } else if (seccion === 'push') {
      cerrarAdmin();
      document.getElementById('push-panel').classList.add('activo');
    }
  }

  function cerrarPush() {
    document.getElementById('push-panel').classList.remove('activo');
    document.getElementById('admin-panel').classList.add('activo');
  }

  function actualizarPreview() {
    const titulo = document.getElementById('push-titulo').value || 'Título de la notificación';
    const mensaje = document.getElementById('push-mensaje').value || 'Mensaje de la notificación...';
    document.getElementById('preview-titulo-text').textContent = titulo;
    document.getElementById('preview-mensaje-text').textContent = mensaje;
  }

  async function enviarNotificacion() {
    const titulo = document.getElementById('push-titulo').value.trim();
    const mensaje = document.getElementById('push-mensaje').value.trim();
    const imagen = document.getElementById('push-imagen').value.trim();
    const url = document.getElementById('push-url').value.trim();

    if (!titulo) { alert('Escribí un título para la notificación.'); return; }
    if (!mensaje) { alert('Escribí un mensaje para la notificación.'); return; }

    document.getElementById('btn-enviar').disabled = true;
    document.getElementById('btn-enviar').textContent = '⏳ Enviando...';
    document.getElementById('push-resultado').style.display = 'none';

    try {
      const params = new URLSearchParams({
        accion: 'enviarPush',
        titulo: titulo,
        mensaje: mensaje,
        imagen: imagen,
        url: url
      });

      const resp = await fetch(SCRIPT_URL + '?' + params.toString());
      const data = await resp.json();

      const res = document.getElementById('push-resultado');
      const texto = document.getElementById('push-resultado-texto');

      if (data.id) {
        res.className = 'push-resultado ok';
        texto.textContent = '✅ Notificación enviada correctamente.';
      } else {
        res.className = 'push-resultado error';
        texto.textContent = '❌ Error: ' + (data.errors ? JSON.stringify(data.errors) : JSON.stringify(data));
      }
      res.style.display = 'block';

    } catch(e) {
      const res = document.getElementById('push-resultado');
      res.className = 'push-resultado error';
      document.getElementById('push-resultado-texto').textContent = '❌ Error de conexión. Intentá de nuevo.';
      res.style.display = 'block';
    }

    document.getElementById('btn-enviar').disabled = false;
    document.getElementById('btn-enviar').textContent = '🔔 Enviar notificación';
  }
</script>
</body>
</html>
